<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knorri 🧸</title>
<meta name="description" content="Knorri — jouw slimme knuffelbuddy die altijd voor je klaarstaat.">
<meta name="theme-color" content="#F4A261">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Knorri">
<link rel="manifest" id="manifest-placeholder">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #FDF6EC;
    --warm-white: #FFFAF3;
    --amber: #F4A261;
    --amber-dark: #E07B39;
    --amber-light: #FFD5A8;
    --rose: #E8837A;
    --rose-light: #FADADD;
    --mint: #7BCFB8;
    --mint-light: #C8F0E8;
    --lavender: #B8A9D9;
    --lavender-light: #EAE4F5;
    --text-dark: #3A2E28;
    --text-mid: #7A6057;
    --text-soft: #B09080;
    --shadow-warm: 0 4px 20px rgba(244,162,97,0.18);
    --shadow-soft: 0 2px 12px rgba(58,46,40,0.08);
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,213,168,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(200,240,232,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 30%, rgba(234,228,245,0.3) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== LAYOUT ===== */
  #app { 
    position: relative; 
    z-index: 1; 
    display: flex; 
    flex-direction: column; 
    height: 100dvh;
  }

  /* ===== HEADER ===== */
  .app-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(253,246,236,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1.5px solid rgba(244,162,97,0.15);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .knorri-avatar {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--amber-light), var(--rose-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 3px 12px rgba(244,162,97,0.35);
    animation: breathe 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--amber-dark);
    line-height: 1;
  }
  .header-status {
    font-size: 11px;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-time {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 500;
  }

  /* ===== MAIN CONTENT ===== */
  .tab-content { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(253,246,236,0.95);
    backdrop-filter: blur(16px);
    border-top: 1.5px solid rgba(244,162,97,0.12);
    display: flex;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 4px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .nav-btn .nav-icon {
    font-size: 22px;
    transition: transform 0.2s;
    line-height: 1;
  }
  .nav-btn .nav-label {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-soft);
    letter-spacing: 0.3px;
  }
  .nav-btn.active .nav-label { color: var(--amber-dark); }
  .nav-btn.active .nav-icon { transform: scale(1.15); }
  .nav-btn:active { transform: scale(0.92); }

  .nav-active-pill {
    position: absolute;
    bottom: calc(6px + env(safe-area-inset-bottom));
    height: 3px;
    width: 24px;
    background: linear-gradient(90deg, var(--amber), var(--rose));
    border-radius: 99px;
    transition: left 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--warm-white);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-soft);
    border: 1.5px solid rgba(244,162,97,0.1);
    margin-bottom: 14px;
  }

  .card-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== SECTION LABEL ===== */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-soft);
    margin: 20px 0 10px;
    padding-left: 2px;
  }

  /* ===== CHAT ===== */
  .chat-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 4px;
    min-height: 200px;
  }

  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }

  .msg-knorri {
    background: linear-gradient(135deg, var(--amber-light), rgba(255,218,180,0.6));
    border-bottom-left-radius: 6px;
    align-self: flex-start;
    color: var(--text-dark);
    box-shadow: 0 2px 10px rgba(244,162,97,0.2);
  }

  .msg-user {
    background: linear-gradient(135deg, var(--mint-light), rgba(180,235,220,0.6));
    border-bottom-right-radius: 6px;
    align-self: flex-end;
    color: var(--text-dark);
    box-shadow: 0 2px 10px rgba(123,207,184,0.2);
  }

  .msg-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-soft);
    margin-bottom: 3px;
    display: block;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--amber-light), rgba(255,218,180,0.6));
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    align-self: flex-start;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--amber-dark);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-top: 14px;
  }

  .chat-input {
    flex: 1;
    background: var(--warm-white);
    border: 2px solid rgba(244,162,97,0.25);
    border-radius: 20px;
    padding: 11px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    resize: none;
    outline: none;
    max-height: 100px;
    min-height: 44px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--amber); }
  .chat-input::placeholder { color: var(--text-soft); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--amber), var(--rose));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(244,162,97,0.4);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.5; pointer-events: none; }

  /* ===== QUICK ACTIONS ===== */
  .quick-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .chip {
    background: var(--warm-white);
    border: 1.5px solid rgba(244,162,97,0.25);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .chip:active, .chip:hover { background: var(--amber-light); border-color: var(--amber); color: var(--amber-dark); }

  /* ===== MOOD ===== */
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .mood-btn {
    aspect-ratio: 1;
    background: var(--warm-white);
    border: 2px solid rgba(244,162,97,0.12);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-mid);
    transition: all 0.2s;
    box-shadow: var(--shadow-soft);
  }
  .mood-btn .mood-emoji { font-size: 28px; line-height: 1; }
  .mood-btn:active { transform: scale(0.93); }
  .mood-btn.selected { border-color: var(--amber); background: var(--amber-light); color: var(--amber-dark); transform: scale(1.04); }

  /* ===== PLANNING ===== */
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    background: var(--warm-white);
    border: 1.5px solid rgba(244,162,97,0.15);
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-tab.active { background: var(--amber); color: white; border-color: var(--amber); box-shadow: 0 3px 10px rgba(244,162,97,0.35); }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid rgba(244,162,97,0.1);
  }
  .task-item:last-child { border-bottom: none; }

  .task-time {
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    color: var(--text-soft);
    min-width: 38px;
    text-align: center;
    font-weight: 500;
  }

  .task-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .task-info { flex: 1; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
  .task-cat { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

  .task-check {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid rgba(244,162,97,0.3);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .task-check.done { background: var(--mint); border-color: var(--mint); color: white; }

  /* ===== GOALS ===== */
  .goal-card {
    background: var(--warm-white);
    border-radius: var(--radius-md);
    padding: 15px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-soft);
    border: 1.5px solid rgba(244,162,97,0.1);
  }

  .goal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .goal-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dark);
  }

  .goal-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--lavender-light);
    color: var(--lavender);
  }

  .progress-bar-wrap {
    height: 7px;
    background: rgba(244,162,97,0.15);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 7px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--amber), var(--rose));
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 600;
  }

  /* ===== TIPS ===== */
  .tip-card {
    background: var(--warm-white);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    box-shadow: var(--shadow-soft);
    border-left: 4px solid var(--amber);
    transition: all 0.2s;
  }

  .tip-icon { font-size: 26px; flex-shrink: 0; }
  .tip-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 4px;
  }
  .tip-text { font-size: 12.5px; color: var(--text-mid); line-height: 1.5; }

  /* ===== BUTTONS ===== */
  .btn-primary {
    background: linear-gradient(135deg, var(--amber), var(--amber-dark));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(244,162,97,0.4);
    transition: all 0.2s;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary:active { transform: scale(0.96); }

  .btn-outline {
    background: none;
    border: 2px solid rgba(244,162,97,0.35);
    color: var(--amber-dark);
    border-radius: 14px;
    padding: 10px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:active { background: var(--amber-light); }

  /* ===== INPUT ===== */
  .input-field {
    width: 100%;
    background: rgba(244,162,97,0.06);
    border: 2px solid rgba(244,162,97,0.2);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  .input-field:focus { border-color: var(--amber); }
  .input-field::placeholder { color: var(--text-soft); }

  /* ===== HISTORY PANEL ===== */
  .history-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 300;
    display: flex;
    pointer-events: none;
  }
  .history-panel.open { pointer-events: all; }

  .history-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(58,46,40,0.35);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .history-panel.open .history-backdrop { opacity: 1; }

  .history-drawer {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 82%;
    max-width: 320px;
    background: var(--warm-white);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 30px rgba(58,46,40,0.15);
    border-radius: 0 24px 24px 0;
  }
  .history-panel.open .history-drawer { transform: translateX(0); }

  .history-header {
    padding: 20px 18px 14px;
    border-bottom: 1.5px solid rgba(244,162,97,0.12);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .history-header-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--amber-dark);
    flex: 1;
  }
  .history-close {
    background: rgba(244,162,97,0.12);
    border: none;
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    scrollbar-width: none;
  }
  .history-list::-webkit-scrollbar { display: none; }

  .history-item {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.15s;
    border: 1.5px solid transparent;
  }
  .history-item:hover, .history-item.active-conv {
    background: var(--amber-light);
    border-color: rgba(244,162,97,0.3);
  }
  .history-item-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .history-item-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item-date { font-size: 10.5px; color: var(--text-soft); font-weight: 600; }
  .history-item-count { font-size: 10px; color: var(--text-soft); background: rgba(244,162,97,0.15); padding: 2px 7px; border-radius: 99px; font-weight: 700; }

  .history-delete {
    float: right;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.4;
    padding: 2px 4px;
    margin-top: -2px;
  }
  .history-delete:hover { opacity: 1; }

  .history-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.7;
  }
  .history-empty-icon { font-size: 36px; margin-bottom: 10px; }

  .knorri-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 10px;
    text-align: center;
  }

  .hero-bear {
    font-size: 72px;
    line-height: 1;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(244,162,97,0.3));
    margin-bottom: 12px;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }

  .hero-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--amber-dark);
    margin-bottom: 5px;
  }

  .hero-sub {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
    max-width: 280px;
  }

  /* ===== MOOD HISTORY ===== */
  .mood-history {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .mood-history-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--text-soft);
    font-weight: 600;
  }
  .mood-history-emoji { font-size: 20px; }

  /* ===== SCROLL STYLING ===== */
  .tab-content::-webkit-scrollbar { display: none; }
  .tab-content { scrollbar-width: none; }

  /* ===== SHIMMER ===== */
  .shimmer {
    background: linear-gradient(90deg, rgba(244,162,97,0.1) 25%, rgba(244,162,97,0.2) 50%, rgba(244,162,97,0.1) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
